name = "rocchat-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database ──
[[d1_databases]]
binding = "DB"
database_name = "rocchat-db"
database_id = "f2bfb6ff-9301-49d1-b8c7-4c2abe104831"

# ── R2 Bucket (encrypted media) ──
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "rocchat-media"

# ── KV Namespace (sessions, rate limits) ──
[[kv_namespaces]]
binding = "KV"
id = "df07663e9fda4cbb92dfeba95da05851"

# ── Durable Objects ──
[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

# ── Cron Triggers (scheduled worker) ──
# Uncomment when cron slot is available (free plan: 5 triggers max across account)
# [triggers]
# crons = ["*/5 * * * *"]  # Every 5 minutes: send scheduled msgs, purge expired, retention cleanup

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

# ── Environment Variables ──
[vars]
POW_DIFFICULTY = "18"  # Proof-of-work difficulty (no Turnstile/CAPTCHA dependency)

# ── Scheduled Workers (cron) ──
# Disabled: free plan cron trigger limit reached
# [triggers]
# crons = ["*/5 * * * *"]  # Every 5 minutes: clean expired messages, used OPKs
