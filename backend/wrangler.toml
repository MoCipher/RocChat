name = "rocchat-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database ──
[[d1_databases]]
binding = "DB"
database_name = "rocchat-db"
database_id = "f2bfb6ff-9301-49d1-b8c7-4c2abe104831"

# ── R2 Bucket (encrypted media) ──
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "rocchat-media"

# ── KV Namespace (sessions, rate limits) ──
[[kv_namespaces]]
binding = "KV"
id = "df07663e9fda4cbb92dfeba95da05851"

# ── Durable Objects ──
[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[durable_objects.bindings]]
name = "USER_INBOX"
class_name = "UserInbox"

[[durable_objects.bindings]]
name = "MEETING_STATE"
class_name = "MeetingState"

# ── Cron Triggers (scheduled worker) ──
# Account cron quota is fully used by other production workers.
# RocChat maintenance is invoked via GitHub Actions hitting:
#   POST /api/internal/maintenance/run
# with secret header: x-scheduler-secret
# [triggers]
# crons = ["*/5 * * * *"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UserInbox"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["MeetingState"]

# ── Environment Variables ──
[vars]
POW_DIFFICULTY = "18"  # Proof-of-work difficulty (no Turnstile/CAPTCHA dependency)
# Set via secret in prod: `wrangler secret put SCHEDULER_SECRET`

# ── Scheduled Workers (cron) ── (see [triggers] above)
