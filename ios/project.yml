name: RocChat
options:
  bundleIdPrefix: com.mocipher
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES

targets:
  RocChat:
    type: application
    platform: iOS
    sources:
      - path: RocChat
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "RocChat needs camera access for video calls"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "RocChat needs microphone access for voice and video calls"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "RocChat uses Face ID to protect your messages"
        # ATS defaults already enforce HTTPS-only with TLS 1.2+. No exceptions
        # required because both pinned hosts (chat.mocipher.com and
        # rocchat-api.spoass.workers.dev) satisfy ATS by default.
        PRODUCT_BUNDLE_IDENTIFIER: com.mocipher.rocchat
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        # Mac Catalyst — build the same iOS target for macOS as a first-class app
        SUPPORTS_MACCATALYST: YES
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
        # iPad + iPhone + Mac
        TARGETED_DEVICE_FAMILY: "1,2,6"
    dependencies: []
