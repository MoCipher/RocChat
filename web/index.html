<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' wss: https://rocchat-api.spoass.workers.dev https://ntfy.roc.family; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#D4AF37" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0D1117" />
  <meta name="description" content="RocChat — Messages. Calls. Nothing else. Everything encrypted." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RocChat" />
  <meta name="color-scheme" content="dark light" />
  <!-- iOS splash screens — iPhone SE to 16 Pro Max -->
  <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="/favicon.svg" />
  <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="/favicon.svg" />
  <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="/favicon.svg" />
  <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="/favicon.svg" />
  <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" href="/favicon.svg" />
  <link rel="apple-touch-startup-image" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" href="/favicon.svg" />
  <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="/favicon.svg" />
  <meta property="og:title" content="RocChat — Encrypted Messaging" />
  <meta property="og:description" content="End-to-end encrypted messaging. Messages. Calls. Nothing else." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://chat.mocipher.com" />
  <meta property="og:image" content="/favicon.svg" />
  <title>RocChat</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Self-hosted fonts — no Google, no tracking -->
  <!-- Fonts loaded via @fontsource in main.ts entry -->

  <!-- Lucide Icons loaded via npm bundle in main.ts -->

  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <a class="skip-link" href="#app">Skip to content</a>
  <div class="offline-banner" id="offline-banner" role="alert">You are offline — messages will be queued</div>
  <div id="app" role="main" aria-label="RocChat Application">
    <!-- Loading screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-particles" aria-hidden="true">
        <span class="particle"></span><span class="particle"></span><span class="particle"></span>
        <span class="particle"></span><span class="particle"></span><span class="particle"></span>
        <span class="particle"></span><span class="particle"></span>
      </div>
      <div class="loading-bird">
        <div class="security-ring ring-1"></div>
        <div class="security-ring ring-2"></div>
        <div class="security-ring ring-3"></div>
        <img src="/favicon.svg" width="80" height="80" alt="RocChat" />
      </div>
      <h1 class="loading-title">RocChat</h1>
      <p class="loading-subtitle">End-to-end encrypted</p>
      <div class="loading-spinner"></div>
    </div>
  </div>

  <script type="module" src="/src/app.ts"></script>
  <script src="/sw-init.js"></script>
</body>
</html>
