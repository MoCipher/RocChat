<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#D4AF37" />
  <meta name="description" content="RocChat — Messages. Calls. Nothing else. Everything encrypted." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RocChat" />
  <meta property="og:title" content="RocChat — Encrypted Messaging" />
  <meta property="og:description" content="End-to-end encrypted messaging. Messages. Calls. Nothing else." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://chat.mocipher.com" />
  <meta property="og:image" content="/favicon.svg" />
  <title>RocChat</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Lucide Icons (CDN) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Cloudflare Turnstile -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script>
    window.__turnstileToken = '';
    function onTurnstileSuccess(token) { window.__turnstileToken = token; }
  </script>

  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <a class="skip-link" href="#app">Skip to content</a>
  <div class="offline-banner" id="offline-banner" role="alert">You are offline — messages will be queued</div>
  <div id="app" role="main" aria-label="RocChat Application">
    <!-- Loading screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-bird">
        <img src="/favicon.svg" width="80" height="80" alt="RocChat" />
      </div>
      <h1 class="loading-title">RocChat</h1>
      <p class="loading-subtitle">End-to-end encrypted</p>
      <div class="loading-spinner"></div>
    </div>
  </div>

  <script type="module" src="/src/app.ts"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
