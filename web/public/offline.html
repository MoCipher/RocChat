<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#D4AF37" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'sha256-UnMbLNEJAuoslufr1FFBd04Ci8d8Y9qIOydlt/KGr54='; style-src 'unsafe-inline'; img-src 'self' data:;" />
  <title>RocChat — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #151210; color: #E8E2D4;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; min-height: 100dvh; padding: 24px; text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 24px; opacity: 0.6; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #D4AF37; }
    p { font-size: 0.9rem; color: #A09888; max-width: 320px; line-height: 1.5; margin-bottom: 24px; }
    button {
      background: rgba(212, 175, 55, 0.15); color: #D4AF37; border: 1px solid rgba(212, 175, 55, 0.3);
      padding: 12px 32px; border-radius: 12px; font-size: 0.9rem; cursor: pointer;
      font-family: inherit; font-weight: 600; transition: background 0.2s;
    }
    button:hover { background: rgba(212, 175, 55, 0.25); }
    @media (prefers-color-scheme: light) {
      body { background: #F5F3ED; color: #1A1A2E; }
      p { color: #5C5A6E; }
    }
  </style>
</head>
<body>
  <div class="icon" aria-hidden="true">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l22 22"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
  </div>
  <h1>You're Offline</h1>
  <p>Your messages are safe and encrypted locally. They'll sync automatically when your connection returns.</p>
  <button id="retry-btn">Try Again</button>
  <script>document.getElementById('retry-btn').addEventListener('click',function(){location.reload()})</script>
</body>
</html>
