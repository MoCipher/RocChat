<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#D4AF37" />
  <title>RocChat — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #151210; color: #E8E2D4;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; min-height: 100dvh; padding: 24px; text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 24px; opacity: 0.6; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #D4AF37; }
    p { font-size: 0.9rem; color: #A09888; max-width: 320px; line-height: 1.5; margin-bottom: 24px; }
    button {
      background: rgba(212, 175, 55, 0.15); color: #D4AF37; border: 1px solid rgba(212, 175, 55, 0.3);
      padding: 12px 32px; border-radius: 12px; font-size: 0.9rem; cursor: pointer;
      font-family: inherit; font-weight: 600; transition: background 0.2s;
    }
    button:hover { background: rgba(212, 175, 55, 0.25); }
    @media (prefers-color-scheme: light) {
      body { background: #F5F3ED; color: #1A1A2E; }
      p { color: #5C5A6E; }
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>Your messages are safe and encrypted locally. They'll sync automatically when your connection returns.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
